services:
  my-service-web:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
    # build:
    #   context: ./nginx
    #   dockerfile: Dockerfile
    container_name: my-web
    ports:
      - "80:80"
    volumes:
      - /home/ec2-user/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ec2-user/nginx/html:/usr/share/nginx/html:ro
      - /home/ec2-user/nginx/logs:/var/log/nginx
    restart: always
    networks:
      - public-subnet

networks:
  public-subnet:
    driver: bridge
