name: Auto-Scaling-Instance-Deployment-Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} # IAM 사용자 액세스 키
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} # IAM 사용자 비밀 키
          aws-region: ${{ secrets.AWS_REGION }} # 대상 AWS 리전

      # S3 버킷에 Nginx 설정 파일과 웹 자산 업로드
      - name: Upload Config and Assets to S3
        run: |
          aws s3 cp ./docker-compose.yaml s3://${{ secrets.S3_BUCKET_NAME }}/docker-compose.yaml
          aws s3 cp ./nginx/default.conf s3://${{ secrets.S3_BUCKET_NAME }}/config/default.conf
          aws s3 sync ./nginx/html/ s3://${{ secrets.S3_BUCKET_NAME }}/html/ --delete

      # ECR에 Docker 이미지 빌드 및 푸시
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --no-cache -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./nginx
          docker build --no-cache -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./nginx

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
      # AWS SSM을 통해 EC2인스턴스에 접속하여 실제 배포명령 배포
      - name: Deploy to EC2 using SSM
        run: |
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}"
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:${{secrets.ASG_TAG_KEY}},Values=${{secrets.ASG_TAG_VALUE}}" \
            --parameters 'commands=[
              "mkdir -p /home/ec2-user/nginx/html",
              "mkdir -p /home/ec2-user/nginx/conf.d",
              "chown -R ec2-user:ec2-user /home/ec2-user/nginx",

              "aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/docker-compose.yaml /home/ec2-user/nginx/docker-compose.yaml",
              "aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/config/default.conf /home/ec2-user/nginx/conf.d/default.conf",
              "aws s3 sync s3://${{ secrets.S3_BUCKET_NAME }}/html/ /home/ec2-user/nginx/html/ --delete",

              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}",
              
              "export ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}",
              "export ECR_REPOSITORY=${{ secrets.ECR_REPOSITORY }}",
              "export IMAGE_TAG=${{ github.sha }}",
              
              "cd /home/ec2-user/nginx",
              "docker compose pull",
              "docker compose up -d --remove-orphans",
              "docker image prune -f"
            ]' \
            --region ${{ secrets.AWS_REGION }}
